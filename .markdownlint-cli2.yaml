config:
  MD013: false   # line-length: 允許長行(中文段落)
  MD022: false   # blanks-around-headings: 中文 docs 常緊接標題
  MD025: false   # single-title: reproduction report 以多個 Ch# 作 H1 組織章節
  MD037: false   # no-space-in-emphasis: gte_* 等技術名詞在 emphasis 內
  MD031: false   # blanks-around-fences: code block 前後空行選擇性
  MD032: false   # blanks-around-lists: 列表前後空行選擇性
  MD033: false   # no-inline-html: 允許偶爾的 HTML
  MD034: false   # no-bare-urls: 允許在列表中使用裸 URL
  MD036: false   # no-emphasis-as-heading: 允許 **bold** 作非正式標題
  MD040: false   # fenced-code-language: 不強制 code block 標語言
  MD041: false   # first-line-h1: 允許檔案不以 # 開頭(例如 ADR)
  MD058: false   # blanks-around-tables: table 前後空行選擇性

  MD060: false   # table-column-style: repo docs use compact and spaced tables
ignores:
  - ".scratch/**"
  - ".agents/**"
  - ".cache/**" # repo-local tool caches are generated, not documentation
  - ".venv/**" # repo-local virtualenv is generated, not documentation
  - ".uv-cache/**" # repo-local package caches are generated, not documentation
  - "m32a-m33-prompt.md" # local ignored task prompt, not documentation
  - "node_modules/**"
